name: 🚀 Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy pos-tienda
    runs-on: ubuntu-latest

    steps:
      - name: 🔌 Conectar al VPS y desplegar
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            set -e
            PM2=/usr/lib/node_modules/pm2/bin/pm2

            echo "📦 Actualizando código..."
            cd /var/www/pos-tienda
            git fetch origin main
            git reset --hard origin/main

            echo "📥 Instalando dependencias..."
            npm ci

            echo "🔨 Compilando..."
            npm run build

            echo "♻️  Recargando con PM2..."
            # startOrReload re-lee ecosystem.config.js y espera process.send('ready')
            # antes de matar el proceso viejo — sin gap de Bad Gateway.
            $PM2 startOrReload ecosystem.config.js

            $PM2 save

            echo "✅ Deploy completado"
